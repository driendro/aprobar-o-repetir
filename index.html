<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aprobar o Repetir</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: #0a0a0a;
      color: #c8b89a;
      font-family: 'Space Mono', 'Courier New', monospace;
      font-size: 13px;
      line-height: 1.6;
      height: 100vh;
      display: flex;
      flex-direction: column;
      transition: background-color 3s ease;
      overflow: hidden;
    }

    #game {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* Left panel — narrative log */
    #log-panel {
      width: 60%;
      border-right: 1px solid #2a2a2a;
      padding: 24px 20px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    #log-panel::-webkit-scrollbar { width: 4px; }
    #log-panel::-webkit-scrollbar-track { background: transparent; }
    #log-panel::-webkit-scrollbar-thumb { background: #2a2a2a; }

    .log-line {
      opacity: 0;
      transform: translateY(4px);
      transition: opacity 0.6s ease, transform 0.6s ease;
      color: #c8b89a;
    }

    .log-line.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .log-line::before { content: '> '; color: #5a4a3a; }

    /* Right panel — resources + actions */
    #right-panel {
      width: 40%;
      padding: 24px 20px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .section-title {
      color: #5a4a3a;
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      border-bottom: 1px solid #2a2a2a;
      padding-bottom: 4px;
      margin-bottom: 8px;
    }

    /* Resources */
    #resources-section {}

    .resource-row {
      display: flex;
      justify-content: space-between;
      padding: 1px 0;
      opacity: 0;
      transition: opacity 0.6s ease;
    }

    .resource-row.visible { opacity: 1; }

    .resource-name { color: #8a7a62; }

    .resource-value { color: #c8b89a; }

    .buff-indicator {
      font-size: 10px;
      color: #6a8a62;
      margin-left: 6px;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }

    /* Actions */
    #actions-section {}

    .action-btn {
      display: block;
      width: 100%;
      background: transparent;
      border: 1px solid #8a7a62;
      color: #8a7a62;
      font-family: inherit;
      font-size: 12px;
      padding: 5px 10px;
      margin-bottom: 6px;
      cursor: pointer;
      text-align: left;
      transition: color 0.2s, border-color 0.2s, opacity 0.6s;
      opacity: 0;
    }

    .action-btn.visible { opacity: 1; }

    .action-btn:hover {
      color: #c8b89a;
      border-color: #c8b89a;
    }

    .action-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .action-btn:disabled:hover {
      color: #8a7a62;
      border-color: #8a7a62;
    }

    /* Government events section */
    #gov-section {
      display: none;
      background: #0f0505;
      border: 1px solid #7a3a3a;
      padding: 12px;
    }

    #gov-section .section-title { color: #7a3a3a; border-color: #7a3a3a; }

    #gov-event-text {
      margin-bottom: 10px;
      color: #c8a0a0;
      font-size: 12px;
    }

    .gov-btn {
      display: inline-block;
      background: transparent;
      border: 1px solid #7a3a3a;
      color: #c8a0a0;
      font-family: inherit;
      font-size: 12px;
      padding: 4px 12px;
      margin-right: 8px;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
    }

    .gov-btn:hover { color: #fff; border-color: #c8a0a0; }

    /* Reset button */
    #reset-area {
      text-align: right;
      padding: 8px 20px;
      border-top: 1px solid #1a1a1a;
      min-height: 28px;
    }

    #reset-btn {
      background: transparent;
      border: none;
      color: #3a3a3a;
      font-family: inherit;
      font-size: 11px;
      cursor: pointer;
      transition: color 0.2s;
    }

    #reset-btn:hover { color: #6a6a6a; }

    #reset-confirm {
      display: none;
      color: #6a6a6a;
      font-size: 11px;
    }

    #reset-confirm span { cursor: pointer; color: #8a7a62; }
    #reset-confirm span:hover { color: #c8b89a; }
  </style>
</head>
<body>
  <div id="game">
    <div id="log-panel"></div>
    <div id="right-panel">
      <div id="resources-section">
        <div class="section-title">recursos</div>
        <div class="resource-row" id="row-apuntes">
          <span class="resource-name">apuntes</span>
          <span><span class="resource-value" id="val-apuntes">0</span></span>
        </div>
        <div class="resource-row" id="row-mate">
          <span class="resource-name">mate</span>
          <span><span class="resource-value" id="val-mate">0</span></span>
        </div>
        <div class="resource-row" id="row-cafe">
          <span class="resource-name">café</span>
          <span><span class="resource-value" id="val-cafe">0</span></span>
        </div>
        <div class="resource-row" id="row-voluntad">
          <span class="resource-name">voluntad</span>
          <span><span class="resource-value" id="val-voluntad">0</span></span>
        </div>
        <div class="resource-row visible" id="row-presupuesto">
          <span class="resource-name">presupuesto_facu</span>
          <span><span class="resource-value" id="val-presupuesto">100</span></span>
        </div>
      </div>

      <div id="actions-section">
        <div class="section-title">acciones</div>
        <button class="action-btn" id="btn-esperar">esperar</button>
        <button class="action-btn" id="btn-apunte">tomar apunte</button>
        <button class="action-btn" id="btn-invitar">invitar a estudiar</button>
        <button class="action-btn" id="btn-asamblea">convocar asamblea</button>
        <button class="action-btn" id="btn-paro">organizar paro</button>
        <button class="action-btn" id="btn-marcha">marchar</button>
        <button class="action-btn" id="btn-conferencia" style="display:none">convocar conferencia de prensa</button>
        <button class="action-btn" id="btn-paro-docente" style="display:none">organizar paro docente</button>
      </div>

      <div id="gov-section">
        <div class="section-title">! gobierno</div>
        <div id="gov-event-text"></div>
        <div id="gov-buttons"></div>
      </div>
    </div>
  </div>

  <div id="reset-area">
    <button id="reset-btn">[nueva partida]</button>
    <span id="reset-confirm">
      ¿reiniciar? todo se perderá.
      <span id="confirm-yes">[confirmar]</span>
      <span id="confirm-no">[cancelar]</span>
    </span>
  </div>

  <script>
    // === STATE ===
    const DEFAULTS = {
      tick: 0,
      resources: {
        apuntes: 0,
        mate: 0,
        cafe: 0,
        voluntad: 0,
        presupuesto: 100
      },
      companions: 0,
      assemblies: 0,
      strikes: 0,
      marches: 0,
      flags: {
        hasTakenNote: false,
        hasCompanion: false,
        hasGroup: false,
        hasCalledAssembly: false,
        hasCalledStrike: false,
        hasMarched: false,
        mateUnlocked: false,
        cafeUnlocked: false,
        voluntadUnlocked: false,
        currentGovEvent: null,
        budgetDecayModifier: 1,
        budgetDecayPauseTicks: 0,
        lastEventTick: -90,
        lastGovEventTick: -90,
        apuntesBlockedTicks: 0,
        voluntadBlockedTicks: 0,
        lightBlockedTicks: 0,
        positiveEventBoostTicks: 0,
        reactionBtnConferencia: false,
        reactionBtnParoDocente: false
      }
    };

    let STATE = JSON.parse(JSON.stringify(DEFAULTS));

    function saveState() {
      localStorage.setItem('aor_state', JSON.stringify(STATE));
    }

    function loadState() {
      const saved = localStorage.getItem('aor_state');
      if (saved) {
        try {
          const parsed = JSON.parse(saved);
          // Merge to handle new keys added in future versions
          STATE = Object.assign(JSON.parse(JSON.stringify(DEFAULTS)), parsed);
          STATE.resources = Object.assign({}, DEFAULTS.resources, parsed.resources);
          STATE.flags = Object.assign({}, DEFAULTS.flags, parsed.flags);
        } catch (e) {
          STATE = JSON.parse(JSON.stringify(DEFAULTS));
        }
      }
    }

    function resetState() {
      localStorage.removeItem('aor_state');
      STATE = JSON.parse(JSON.stringify(DEFAULTS));
    }

    // === EVENTS ===
    const EVENTS = {
      chaos: [
        {
          id: 'siu',
          condition: (F) => F.hasTakenNote,
          narrative: ['El SIU Guaraní se cayó.', 'Perdés los apuntes de esta semana.'],
          effect(R, F) { R.apuntes = Math.max(0, R.apuntes * 0.7); }
        },
        {
          id: 'docente',
          condition: (F) => F.hasGroup,
          narrative: ['Un docente renunció.', 'Era el mejor de la cátedra.'],
          effect(R, F) { R.voluntad = Math.max(0, R.voluntad - 15); }
        },
        {
          id: 'luz',
          condition: (F) => F.hasTakenNote,
          narrative: ['Cortaron la luz.', 'La clase se suspendió.'],
          effect(R, F) { F.apuntesBlockedTicks = 60; }
        },
        {
          id: 'fotocopiadora',
          condition: (F) => F.hasTakenNote,
          narrative: ['El fotocopiador del pasillo se rompió.', 'A conseguir apuntes de otra forma.'],
          effect(R, F) { R.apuntes = Math.max(0, R.apuntes - 10); R.mate = Math.max(0, R.mate - 3); }
        },
        {
          id: 'transporte',
          condition: (F) => F.hasGroup,
          narrative: ['Paro de transporte.', 'Nadie llegó a la facu hoy.'],
          effect(R, F) { R.voluntad = Math.max(0, R.voluntad - 20); F.voluntadBlockedTicks = 30; }
        }
      ],

      gov: [
        {
          id: 'comedor',
          condition: (F) => F.hasGroup,
          text: 'El gobierno ofrece fondos a cambio de privatizar el comedor universitario.',
          choices: [
            {
              label: '[aceptar]',
              narrative: 'Aceptaron. El comedor ahora cobra. Algunos no pueden pagar.',
              effect(R, F) { R.presupuesto = Math.min(100, R.presupuesto + 15); R.voluntad = Math.max(0, R.voluntad - 30); }
            },
            {
              label: '[rechazar]',
              narrative: 'Rechazaron. El comedor sigue siendo de todos.',
              effect(R, F) { R.voluntad = Math.min(999, R.voluntad + 20); }
            }
          ]
        },
        {
          id: 'ingreso',
          condition: (F) => F.hasCalledAssembly,
          text: 'Proponen examen eliminatorio de ingreso a cambio de más presupuesto.',
          choices: [
            {
              label: '[aceptar]',
              narrative: 'El ingreso irrestricto se perdió. Algunos compañeros no pudieron entrar.',
              effect(R, F) { R.presupuesto = Math.min(100, R.presupuesto + 10); R.voluntad = Math.max(0, R.voluntad - 25); }
            },
            {
              label: '[rechazar]',
              narrative: 'La universidad pública sigue siendo de todos. Por ahora.',
              effect(R, F) { R.voluntad = Math.min(999, R.voluntad + 15); }
            }
          ]
        },
        {
          id: 'veto',
          condition: (F) => F.hasGroup,
          text: 'Vetaron la ley de financiamiento universitario.',
          choices: null, // no choice — immediate effect + reaction button
          narrative: 'El presupuesto cae 20 puntos de golpe. El ajuste se acelera.',
          effect(R, F) {
            R.presupuesto = Math.max(0, R.presupuesto - 20);
            F.budgetDecayModifier = Math.min(3, F.budgetDecayModifier + 1);
            F.reactionBtnConferencia = true;
          }
        },
        {
          id: 'ajuste',
          condition: (F) => F.hasGroup,
          text: 'Anunciaron ajuste del 30% al presupuesto universitario.',
          choices: null,
          narrative: 'La tasa de recorte se duplica. El gobierno lo llama "eficiencia".',
          effect(R, F) {
            F.budgetDecayModifier = Math.min(3, F.budgetDecayModifier + 1);
            F.reactionBtnParoDocente = true;
          }
        }
      ],

      positive: [
        {
          id: 'noticias',
          condition: (F) => F.hasMarched,
          narrative: ['Salió en las noticias la marcha.', 'La gente se suma.'],
          effect(R, F) { R.voluntad = Math.min(999, R.voluntad + 30); }
        },
        {
          id: 'financiamiento',
          condition: (F) => F.hasCalledAssembly,
          narrative: ['Una cátedra consiguió financiamiento externo.', 'Respiro temporal.'],
          effect(R, F) { R.presupuesto = Math.min(100, R.presupuesto + 8); }
        },
        {
          id: 'solidaridad',
          condition: (F) => F.hasCalledStrike,
          narrative: ['Estudiantes de otras facultades se solidarizaron.'],
          effect(R, F) { R.voluntad = Math.min(999, R.voluntad + 25); }
        },
        {
          id: 'rector',
          condition: (F) => F.hasCalledAssembly,
          narrative: ['El rector salió a respaldar al claustro.', 'El recorte frena por unos días.'],
          effect(R, F) { F.budgetDecayPauseTicks = Math.max(F.budgetDecayPauseTicks, 90); }
        }
      ]
    };

    // === GAME ===
    const GAME = {
      tickInterval: null,

      start() {
        loadState();
        if (STATE.tick === 0) {
          // Fresh game — queue opening narrative
          setTimeout(() => UI.addLog('Estás solo en el aula.'), 500);
          setTimeout(() => UI.addLog('Hay silencio.'), 1800);
          setTimeout(() => UI.addLog('La pizarra está en blanco.'), 3200);
          setTimeout(() => UI.addLog('Afuera, algo pasa. Todavía no sabés qué.'), 5000);
        }
        this.tickInterval = setInterval(() => this.tick(), 1000);
        this.tick(); // immediate first tick for render
      },

      tick() {
        STATE.tick++;
        const R = STATE.resources;
        const F = STATE.flags;

        // --- Buff calculation ---
        const cafeBuffActive = R.cafe >= 8;
        const mateBuffActive = R.mate >= 5;
        const apuntesMult = cafeBuffActive ? 1.2 : 1;
        const voluntadMult = mateBuffActive ? 1.15 : 1;

        // --- Resource accumulation ---
        if (F.hasTakenNote && F.apuntesBlockedTicks <= 0) {
          R.apuntes = Math.min(999, R.apuntes + 0.2 * apuntesMult);
        }
        if (F.mateUnlocked) {
          R.mate = Math.min(20, R.mate + 0.3);
        }
        if (F.cafeUnlocked) {
          R.cafe = Math.min(12, R.cafe + 0.2);
        }
        if (F.voluntadUnlocked && F.voluntadBlockedTicks <= 0) {
          R.voluntad = Math.min(999, R.voluntad + 0.1 * voluntadMult);
        }

        // --- Mate and café decay ---
        if (F.mateUnlocked && STATE.tick % 45 === 0) {
          R.mate = Math.max(0, R.mate - 1);
        }
        if (F.cafeUnlocked && STATE.tick % 60 === 0) {
          R.cafe = Math.max(0, R.cafe - 1);
        }

        // --- Budget decay ---
        if (F.budgetDecayPauseTicks > 0) {
          F.budgetDecayPauseTicks--;
        } else {
          const decayRate = 0.05 * Math.min(3, F.budgetDecayModifier);
          R.presupuesto = Math.max(0, R.presupuesto - decayRate);
        }

        // --- Blocked tick countdown ---
        if (F.apuntesBlockedTicks > 0) F.apuntesBlockedTicks--;
        if (F.voluntadBlockedTicks > 0) F.voluntadBlockedTicks--;
        if (F.lightBlockedTicks > 0) F.lightBlockedTicks--;
        if (F.positiveEventBoostTicks > 0) F.positiveEventBoostTicks--;

        // --- Budget decay modifier reset after crisis windows ---
        // (modifier is reset by the event that sets it, via a separate countdown)

        saveState();
        GAME.checkUnlocks();
        UI.render();
        GAME.maybeFireEvent();
      },

      checkUnlocks() {
        const R = STATE.resources;
        const F = STATE.flags;
        const t = STATE.tick;

        // Phase 1 → show esperar after a few ticks
        UI.show('btn-esperar', t >= 3);

        // Phase 2
        UI.show('btn-apunte', F.hasTakenNote);
        UI.show('row-apuntes', F.hasTakenNote);
        UI.show('row-mate', F.mateUnlocked);
        UI.show('row-cafe', F.cafeUnlocked);
        UI.show('row-voluntad', F.voluntadUnlocked);

        // Phase 3
        UI.show('btn-invitar', F.hasTakenNote && Math.floor(R.apuntes) >= 10 && !F.hasCompanion);

        // Phase 5+ actions
        const canAsamblea = F.hasGroup && R.presupuesto < 60 && !F.hasCalledAssembly;
        UI.show('btn-asamblea', canAsamblea);

        const canParo = F.hasCalledAssembly && !F.hasCalledStrike;
        UI.show('btn-paro', canParo);

        const canMarcha = F.hasCalledStrike;
        UI.show('btn-marcha', canMarcha);

        // Reaction buttons
        UI.show('btn-conferencia', F.reactionBtnConferencia);
        UI.show('btn-paro-docente', F.reactionBtnParoDocente);

        // Background darkening
        UI.updateBackground(R.presupuesto);

        // Buff indicators
        UI.updateBuffIndicators(R.cafe >= 8, R.mate >= 5);

        // Disable buttons when costs aren't met
        const btnAsamblea = document.getElementById('btn-asamblea');
        if (btnAsamblea && btnAsamblea.style.display !== 'none') {
          btnAsamblea.disabled = R.mate < 8 || R.voluntad < 30;
          btnAsamblea.title = R.mate < 8 || R.voluntad < 30
            ? `necesitás mate ≥ 8 (tenés ${Math.floor(R.mate)}) y voluntad ≥ 30 (tenés ${Math.floor(R.voluntad)})`
            : '';
        }
        const btnParo = document.getElementById('btn-paro');
        if (btnParo && btnParo.style.display !== 'none') {
          btnParo.disabled = R.voluntad < 50;
          btnParo.title = R.voluntad < 50 ? `necesitás voluntad ≥ 50` : '';
        }
        const btnMarcha = document.getElementById('btn-marcha');
        if (btnMarcha && btnMarcha.style.display !== 'none') {
          btnMarcha.disabled = R.voluntad < 80 || R.apuntes < 20;
          btnMarcha.title = R.voluntad < 80 || R.apuntes < 20
            ? `necesitás voluntad ≥ 80 y apuntes ≥ 20` : '';
        }
        const btnConf = document.getElementById('btn-conferencia');
        if (btnConf && btnConf.style.display !== 'none') {
          btnConf.disabled = R.apuntes < 50 || R.voluntad < 30;
        }
        const btnPD = document.getElementById('btn-paro-docente');
        if (btnPD && btnPD.style.display !== 'none') {
          btnPD.disabled = R.voluntad < 50;
        }
      },

      maybeFireEvent() {
        const R = STATE.resources;
        const F = STATE.flags;
        const t = STATE.tick;

        // Don't fire while a gov event is pending
        if (F.currentGovEvent) return;

        const cooldownOk = t - F.lastEventTick >= 90;
        const govCooldownOk = t - F.lastGovEventTick >= 90;

        // Chaos events: 5% chance, cooldown 90 ticks
        if (cooldownOk && Math.random() < 0.05) {
          const eligible = EVENTS.chaos.filter(e => e.condition(F));
          if (eligible.length > 0) {
            const ev = eligible[Math.floor(Math.random() * eligible.length)];
            ev.narrative.forEach((line, i) => setTimeout(() => UI.addLog(line), i * 900));
            setTimeout(() => ev.effect(R, F), ev.narrative.length * 900);
            F.lastEventTick = t;
            return;
          }
        }

        // Government events: 3% chance, phase 5+ (presupuesto < 85), no pending gov event
        if (govCooldownOk && R.presupuesto < 85 && Math.random() < 0.03) {
          const eligible = EVENTS.gov.filter(e => e.condition(F));
          if (eligible.length > 0) {
            const ev = eligible[Math.floor(Math.random() * eligible.length)];
            F.currentGovEvent = ev.id;
            F.lastGovEventTick = t;
            saveState();
            if (ev.choices) {
              UI.showGovEvent(ev);
            } else {
              // No-choice gov event: show text, apply effect on dismiss
              UI.showGovEvent({
                text: ev.text,
                choices: null,
                _evId: ev.id
              });
            }
            return;
          }
        }

        // Positive events: 4% chance if boost active, otherwise 2%
        const positiveChance = F.positiveEventBoostTicks > 0 ? 0.04 : 0.02;
        if (cooldownOk && Math.random() < positiveChance) {
          const eligible = EVENTS.positive.filter(e => e.condition(F));
          if (eligible.length > 0) {
            const ev = eligible[Math.floor(Math.random() * eligible.length)];
            ev.narrative.forEach((line, i) => setTimeout(() => UI.addLog(line), i * 900));
            setTimeout(() => ev.effect(R, F), ev.narrative.length * 900);
            F.lastEventTick = t;
          }
        }
      },

      resolveGovEvent(choice) {
        const R = STATE.resources;
        const F = STATE.flags;
        const evId = F.currentGovEvent;

        if (choice) {
          // Binary choice
          UI.addLog(choice.narrative);
          setTimeout(() => choice.effect(R, F), 900);
        } else {
          // No-choice event (veto, ajuste) — find and apply effect
          const ev = EVENTS.gov.find(e => e.id === evId);
          if (ev) {
            UI.addLog(ev.narrative);
            setTimeout(() => ev.effect(R, F), 900);
          }
        }

        F.currentGovEvent = null;
        UI.hideGovEvent();
        saveState();
      }
    };

    // === UI ===
    const UI = {
      logQueue: [],
      logProcessing: false,

      render() {
        const R = STATE.resources;
        document.getElementById('val-apuntes').textContent = Math.floor(R.apuntes);
        document.getElementById('val-mate').textContent = Math.floor(R.mate);
        document.getElementById('val-cafe').textContent = Math.floor(R.cafe);
        document.getElementById('val-voluntad').textContent = Math.floor(R.voluntad);
        document.getElementById('val-presupuesto').textContent = Math.floor(R.presupuesto);
      },

      show(id, condition) {
        const el = document.getElementById(id);
        if (!el) return;
        if (condition) {
          el.style.display = '';
          // Trigger fade-in on next frame if not already visible
          if (!el.classList.contains('visible')) {
            requestAnimationFrame(() => el.classList.add('visible'));
          }
        } else {
          el.style.display = 'none';
          el.classList.remove('visible');
        }
      },

      addLog(text) {
        this.logQueue.push(text);
        if (!this.logProcessing) this._processQueue();
      },

      _processQueue() {
        if (this.logQueue.length === 0) {
          this.logProcessing = false;
          return;
        }
        this.logProcessing = true;
        const text = this.logQueue.shift();
        const line = document.createElement('div');
        line.className = 'log-line';
        line.textContent = text;
        const panel = document.getElementById('log-panel');
        panel.appendChild(line);
        requestAnimationFrame(() => {
          requestAnimationFrame(() => line.classList.add('visible'));
        });
        panel.scrollTop = panel.scrollHeight;
        setTimeout(() => this._processQueue(), 800);
      },

      updateBackground(presupuesto) {
        let bg;
        if (presupuesto >= 70) bg = '#0a0a0a';
        else if (presupuesto >= 40) bg = '#060608';
        else if (presupuesto >= 15) bg = '#080604';
        else bg = '#080402';
        document.body.style.backgroundColor = bg;
      },

      updateBuffIndicators(cafeActive, mateActive) {
        // Café buff indicator on apuntes row
        let cafeInd = document.getElementById('buff-cafe');
        if (cafeActive) {
          if (!cafeInd) {
            cafeInd = document.createElement('span');
            cafeInd.id = 'buff-cafe';
            cafeInd.className = 'buff-indicator';
            cafeInd.title = 'el grupo está despierto: apuntes +20%';
            cafeInd.textContent = '↑';
            document.querySelector('#row-apuntes .resource-value').after(cafeInd);
          }
        } else if (cafeInd) {
          cafeInd.remove();
        }

        // Mate buff indicator on voluntad row
        let mateInd = document.getElementById('buff-mate');
        if (mateActive) {
          if (!mateInd) {
            mateInd = document.createElement('span');
            mateInd.id = 'buff-mate';
            mateInd.className = 'buff-indicator';
            mateInd.title = 'alguien cebó mate: voluntad +15%';
            mateInd.textContent = '↑';
            document.querySelector('#row-voluntad .resource-value').after(mateInd);
          }
        } else if (mateInd) {
          mateInd.remove();
        }
      },

      showGovEvent(eventObj) {
        const section = document.getElementById('gov-section');
        document.getElementById('gov-event-text').textContent = eventObj.text;
        const buttonsDiv = document.getElementById('gov-buttons');
        buttonsDiv.innerHTML = '';

        if (eventObj.choices) {
          eventObj.choices.forEach(choice => {
            const btn = document.createElement('button');
            btn.className = 'gov-btn';
            btn.textContent = choice.label;
            btn.onclick = () => GAME.resolveGovEvent(choice);
            buttonsDiv.appendChild(btn);
          });
        } else {
          // No-choice event — just show "entendido"
          const btn = document.createElement('button');
          btn.className = 'gov-btn';
          btn.textContent = '[entendido]';
          btn.onclick = () => GAME.resolveGovEvent(null);
          buttonsDiv.appendChild(btn);
        }
        section.style.display = 'block';
      },

      hideGovEvent() {
        document.getElementById('gov-section').style.display = 'none';
        document.getElementById('gov-buttons').innerHTML = '';
        document.getElementById('gov-event-text').textContent = '';
      }
    };

    // === ACTIONS ===
    function applyAction(actionId) {
      const R = STATE.resources;
      const F = STATE.flags;

      if (actionId === 'esperar') {
        // One-time: triggers phase 2
        document.getElementById('btn-esperar').style.display = 'none';
        F.hasTakenNote = false; // will be set by tomar apunte
        F.mateUnlocked = true;
        UI.addLog('Tomás el cuaderno. Algo tenés que hacer.');
        setTimeout(() => UI.addLog('En el pasillo alguien dejó un termo de mate.'), 1200);
        // Delay before showing btn-apunte via flag
        setTimeout(() => { F.hasTakenNote = false; }, 0);
        // Show tomar apunte button
        setTimeout(() => {
          document.getElementById('btn-apunte').style.display = '';
          requestAnimationFrame(() => document.getElementById('btn-apunte').classList.add('visible'));
          document.getElementById('row-apuntes').style.display = '';
          requestAnimationFrame(() => document.getElementById('row-apuntes').classList.add('visible'));
          document.getElementById('row-mate').style.display = '';
          requestAnimationFrame(() => document.getElementById('row-mate').classList.add('visible'));
        }, 2000);
        // Mark esperar as done so it doesn't re-appear
        F.hasTakenNote = true;
        return;
      }

      if (actionId === 'apunte') {
        R.apuntes = Math.min(999, R.apuntes + 5);
        if (Math.floor(R.apuntes) >= 10 && !F.hasCompanion) {
          UI.addLog('Escuchás pasos en el pasillo.');
        }
        return;
      }

      if (actionId === 'invitar') {
        if (R.apuntes < 10) return;
        R.apuntes -= 10;
        STATE.companions++;
        F.hasCompanion = true;
        F.hasGroup = true;
        F.cafeUnlocked = true;
        F.voluntadUnlocked = true;
        UI.addLog('Entra Agustín. "¿Tenés los apuntes del parcial?"');
        setTimeout(() => UI.addLog('Se sienta. Pide café. La charla empieza.'), 1000);
        setTimeout(() => UI.addLog('Hay algo diferente en el aula cuando no estás solo.'), 2200);
        setTimeout(() => {
          document.getElementById('row-cafe').style.display = '';
          requestAnimationFrame(() => document.getElementById('row-cafe').classList.add('visible'));
          document.getElementById('row-voluntad').style.display = '';
          requestAnimationFrame(() => document.getElementById('row-voluntad').classList.add('visible'));
        }, 1500);
        document.getElementById('btn-invitar').style.display = 'none';
        return;
      }

      if (actionId === 'asamblea') {
        if (R.mate < 8 || R.voluntad < 30) {
          UI.addLog('No hay suficiente voluntad ni mate para convocar.');
          return;
        }
        R.mate -= 8;
        R.voluntad -= 30;
        STATE.assemblies++;
        F.hasCalledAssembly = true;
        F.budgetDecayPauseTicks = Math.max(F.budgetDecayPauseTicks, 60);
        UI.addLog('Convocás la asamblea en el hall.');
        setTimeout(() => UI.addLog('Aparecen más personas de las esperadas.'), 1000);
        setTimeout(() => UI.addLog('Por ahora, el ajuste frena un poco.'), 2200);
        document.getElementById('btn-asamblea').style.display = 'none';
        return;
      }

      if (actionId === 'paro') {
        if (R.voluntad < 50) {
          UI.addLog('Falta voluntad para sostener un paro.');
          return;
        }
        R.voluntad -= 50;
        STATE.strikes++;
        F.hasCalledStrike = true;
        F.budgetDecayPauseTicks = Math.max(F.budgetDecayPauseTicks, 180);
        UI.addLog('El paro es total. Las aulas vacías pesan.');
        setTimeout(() => UI.addLog('Los medios lo ignoran, pero dentro de la facu se siente.'), 1200);
        return;
      }

      if (actionId === 'marcha') {
        if (R.voluntad < 80 || R.apuntes < 20) {
          UI.addLog('Falta voluntad y apuntes para organizar la marcha.');
          return;
        }
        R.voluntad -= 80;
        R.apuntes -= 20;
        STATE.marches++;
        F.hasMarched = true;
        F.budgetDecayPauseTicks = Math.max(F.budgetDecayPauseTicks, 180);
        F.positiveEventBoostTicks = 300;
        UI.addLog('La marcha llena la avenida.');
        setTimeout(() => UI.addLog('Hay estudiantes, docentes, no docentes, familias.'), 1000);
        setTimeout(() => UI.addLog('Por un momento, el aula imaginaria es la calle.'), 2200);
        return;
      }

      if (actionId === 'conferencia') {
        if (R.apuntes < 50 || R.voluntad < 30) {
          UI.addLog('No hay suficientes apuntes ni voluntad para la conferencia.');
          return;
        }
        R.apuntes -= 50;
        R.voluntad -= 30;
        R.presupuesto = Math.min(100, R.presupuesto + 5);
        F.budgetDecayPauseTicks = Math.max(F.budgetDecayPauseTicks, 60);
        F.reactionBtnConferencia = false;
        UI.addLog('La conferencia de prensa sale en dos canales.');
        setTimeout(() => UI.addLog('El ministerio no contesta. Pero el número subió un poco.'), 1200);
        return;
      }

      if (actionId === 'paro-docente') {
        if (R.voluntad < 50) {
          UI.addLog('Falta voluntad para sostener el paro docente.');
          return;
        }
        R.voluntad -= 50;
        F.budgetDecayModifier = 1; // cancels the x2 from gov event
        F.reactionBtnParoDocente = false;
        UI.addLog('Los docentes paran. El ajuste no puede ignorar eso.');
        setTimeout(() => UI.addLog('La tasa de recorte vuelve a la normalidad.'), 1000);
        return;
      }
    }

    // === INIT ===
    document.addEventListener('DOMContentLoaded', () => {
      // Reset button
      document.getElementById('reset-btn').addEventListener('click', () => {
        document.getElementById('reset-btn').style.display = 'none';
        document.getElementById('reset-confirm').style.display = 'inline';
      });
      document.getElementById('confirm-yes').addEventListener('click', () => {
        resetState();
        location.reload();
      });
      document.getElementById('confirm-no').addEventListener('click', () => {
        document.getElementById('reset-btn').style.display = '';
        document.getElementById('reset-confirm').style.display = 'none';
      });

      ['esperar','apunte','invitar','asamblea','paro','marcha','conferencia','paro-docente'].forEach(id => {
        const btn = document.getElementById('btn-' + id);
        if (btn) btn.addEventListener('click', () => applyAction(id));
      });

      GAME.start();
    });
  </script>
</body>
</html>
