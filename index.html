<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aprobar o Repetir</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: #0a0a0a;
      color: #c8b89a;
      font-family: 'Space Mono', 'Courier New', monospace;
      font-size: 13px;
      line-height: 1.6;
      height: 100vh;
      display: flex;
      flex-direction: column;
      transition: background-color 3s ease;
      overflow: hidden;
    }

    #game {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* Left panel — narrative log */
    #log-panel {
      width: 60%;
      border-right: 1px solid #2a2a2a;
      padding: 24px 20px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    #log-panel::-webkit-scrollbar { width: 4px; }
    #log-panel::-webkit-scrollbar-track { background: transparent; }
    #log-panel::-webkit-scrollbar-thumb { background: #2a2a2a; }

    .log-line {
      opacity: 0;
      transform: translateY(4px);
      transition: opacity 0.6s ease, transform 0.6s ease;
      color: #c8b89a;
    }

    .log-line.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .log-line::before { content: '> '; color: #5a4a3a; }

    /* Right panel — resources + actions */
    #right-panel {
      width: 40%;
      padding: 24px 20px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .section-title {
      color: #5a4a3a;
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      border-bottom: 1px solid #2a2a2a;
      padding-bottom: 4px;
      margin-bottom: 8px;
    }

    /* Resources */
    #resources-section {}

    .resource-row {
      display: flex;
      justify-content: space-between;
      padding: 1px 0;
      opacity: 0;
      transition: opacity 0.6s ease;
    }

    .resource-row.visible { opacity: 1; }

    .resource-name { color: #8a7a62; }

    .resource-value { color: #c8b89a; }

    .buff-indicator {
      font-size: 10px;
      color: #6a8a62;
      margin-left: 6px;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }

    /* Actions */
    #actions-section {}

    .action-btn {
      display: block;
      width: 100%;
      background: transparent;
      border: 1px solid #8a7a62;
      color: #8a7a62;
      font-family: inherit;
      font-size: 12px;
      padding: 5px 10px;
      margin-bottom: 6px;
      cursor: pointer;
      text-align: left;
      transition: color 0.2s, border-color 0.2s, opacity 0.6s;
      opacity: 0;
    }

    .action-btn.visible { opacity: 1; }

    .action-btn:hover {
      color: #c8b89a;
      border-color: #c8b89a;
    }

    .action-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .action-btn:disabled:hover {
      color: #8a7a62;
      border-color: #8a7a62;
    }

    /* Government events section */
    #gov-section {
      display: none;
      background: #0f0505;
      border: 1px solid #7a3a3a;
      padding: 12px;
    }

    #gov-section .section-title { color: #7a3a3a; border-color: #7a3a3a; }

    #gov-event-text {
      margin-bottom: 10px;
      color: #c8a0a0;
      font-size: 12px;
    }

    .gov-btn {
      display: inline-block;
      background: transparent;
      border: 1px solid #7a3a3a;
      color: #c8a0a0;
      font-family: inherit;
      font-size: 12px;
      padding: 4px 12px;
      margin-right: 8px;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
    }

    .gov-btn:hover { color: #fff; border-color: #c8a0a0; }

    /* Reset button */
    #reset-area {
      text-align: right;
      padding: 8px 20px;
      border-top: 1px solid #1a1a1a;
      min-height: 28px;
    }

    #reset-btn {
      background: transparent;
      border: none;
      color: #3a3a3a;
      font-family: inherit;
      font-size: 11px;
      cursor: pointer;
      transition: color 0.2s;
    }

    #reset-btn:hover { color: #6a6a6a; }

    #reset-confirm {
      display: none;
      color: #6a6a6a;
      font-size: 11px;
    }

    #reset-confirm span { cursor: pointer; color: #8a7a62; }
    #reset-confirm span:hover { color: #c8b89a; }
  </style>
</head>
<body>
  <div id="game">
    <div id="log-panel"></div>
    <div id="right-panel">
      <div id="resources-section">
        <div class="section-title">recursos</div>
        <div class="resource-row" id="row-apuntes">
          <span class="resource-name">apuntes</span>
          <span><span class="resource-value" id="val-apuntes">0</span></span>
        </div>
        <div class="resource-row" id="row-mate">
          <span class="resource-name">mate</span>
          <span><span class="resource-value" id="val-mate">0</span></span>
        </div>
        <div class="resource-row" id="row-cafe">
          <span class="resource-name">café</span>
          <span><span class="resource-value" id="val-cafe">0</span></span>
        </div>
        <div class="resource-row" id="row-voluntad">
          <span class="resource-name">voluntad</span>
          <span><span class="resource-value" id="val-voluntad">0</span></span>
        </div>
        <div class="resource-row visible" id="row-presupuesto">
          <span class="resource-name">presupuesto_facu</span>
          <span><span class="resource-value" id="val-presupuesto">100</span></span>
        </div>
      </div>

      <div id="actions-section">
        <div class="section-title">acciones</div>
        <button class="action-btn" id="btn-esperar">esperar</button>
        <button class="action-btn" id="btn-apunte">tomar apunte</button>
        <button class="action-btn" id="btn-invitar">invitar a estudiar</button>
        <button class="action-btn" id="btn-asamblea">convocar asamblea</button>
        <button class="action-btn" id="btn-paro">organizar paro</button>
        <button class="action-btn" id="btn-marcha">marchar</button>
        <button class="action-btn" id="btn-conferencia" style="display:none">convocar conferencia de prensa</button>
        <button class="action-btn" id="btn-paro-docente" style="display:none">organizar paro docente</button>
      </div>

      <div id="gov-section">
        <div class="section-title">! gobierno</div>
        <div id="gov-event-text"></div>
        <div id="gov-buttons"></div>
      </div>
    </div>
  </div>

  <div id="reset-area">
    <button id="reset-btn">[nueva partida]</button>
    <span id="reset-confirm">
      ¿reiniciar? todo se perderá.
      <span id="confirm-yes">[confirmar]</span>
      <span id="confirm-no">[cancelar]</span>
    </span>
  </div>

  <script>
    // === STATE ===
    const DEFAULTS = {
      tick: 0,
      resources: {
        apuntes: 0,
        mate: 0,
        cafe: 0,
        voluntad: 0,
        presupuesto: 100
      },
      companions: 0,
      assemblies: 0,
      strikes: 0,
      marches: 0,
      flags: {
        hasTakenNote: false,
        hasCompanion: false,
        hasGroup: false,
        hasCalledAssembly: false,
        hasCalledStrike: false,
        hasMarched: false,
        mateUnlocked: false,
        cafeUnlocked: false,
        voluntadUnlocked: false,
        currentGovEvent: null,
        budgetDecayModifier: 1,
        budgetDecayPauseTicks: 0,
        lastEventTick: -90,
        lastGovEventTick: -90,
        apuntesBlockedTicks: 0,
        voluntadBlockedTicks: 0,
        lightBlockedTicks: 0,
        positiveEventBoostTicks: 0,
        reactionBtnConferencia: false,
        reactionBtnParoDocente: false
      }
    };

    let STATE = JSON.parse(JSON.stringify(DEFAULTS));

    function saveState() {
      localStorage.setItem('aor_state', JSON.stringify(STATE));
    }

    function loadState() {
      const saved = localStorage.getItem('aor_state');
      if (saved) {
        try {
          const parsed = JSON.parse(saved);
          // Merge to handle new keys added in future versions
          STATE = Object.assign(JSON.parse(JSON.stringify(DEFAULTS)), parsed);
          STATE.resources = Object.assign({}, DEFAULTS.resources, parsed.resources);
          STATE.flags = Object.assign({}, DEFAULTS.flags, parsed.flags);
        } catch (e) {
          STATE = JSON.parse(JSON.stringify(DEFAULTS));
        }
      }
    }

    function resetState() {
      localStorage.removeItem('aor_state');
      STATE = JSON.parse(JSON.stringify(DEFAULTS));
    }

    // === GAME ===
    const GAME = {
      tickInterval: null,

      start() {
        loadState();
        this.tickInterval = setInterval(() => this.tick(), 1000);
        this.tick(); // immediate first tick for render
      },

      tick() {
        STATE.tick++;
        const R = STATE.resources;
        const F = STATE.flags;

        // --- Buff calculation ---
        const cafeBuffActive = R.cafe >= 8;
        const mateBuffActive = R.mate >= 5;
        const apuntesMult = cafeBuffActive ? 1.2 : 1;
        const voluntadMult = mateBuffActive ? 1.15 : 1;

        // --- Resource accumulation ---
        if (F.hasTakenNote && F.apuntesBlockedTicks <= 0) {
          R.apuntes = Math.min(999, R.apuntes + 0.2 * apuntesMult);
        }
        if (F.mateUnlocked) {
          R.mate = Math.min(20, R.mate + 0.3);
        }
        if (F.cafeUnlocked) {
          R.cafe = Math.min(12, R.cafe + 0.2);
        }
        if (F.voluntadUnlocked && F.voluntadBlockedTicks <= 0) {
          R.voluntad = Math.min(999, R.voluntad + 0.1 * voluntadMult);
        }

        // --- Mate and café decay ---
        if (F.mateUnlocked && STATE.tick % 45 === 0) {
          R.mate = Math.max(0, R.mate - 1);
        }
        if (F.cafeUnlocked && STATE.tick % 60 === 0) {
          R.cafe = Math.max(0, R.cafe - 1);
        }

        // --- Budget decay ---
        if (F.budgetDecayPauseTicks > 0) {
          F.budgetDecayPauseTicks--;
        } else {
          const decayRate = 0.05 * Math.min(3, F.budgetDecayModifier);
          R.presupuesto = Math.max(0, R.presupuesto - decayRate);
        }

        // --- Blocked tick countdown ---
        if (F.apuntesBlockedTicks > 0) F.apuntesBlockedTicks--;
        if (F.voluntadBlockedTicks > 0) F.voluntadBlockedTicks--;
        if (F.lightBlockedTicks > 0) F.lightBlockedTicks--;
        if (F.positiveEventBoostTicks > 0) F.positiveEventBoostTicks--;

        // --- Budget decay modifier reset after crisis windows ---
        // (modifier is reset by the event that sets it, via a separate countdown)

        saveState();
        GAME.checkUnlocks();
        UI.render();
        GAME.maybeFireEvent();
      },

      checkUnlocks() {
        const R = STATE.resources;
        const F = STATE.flags;
        const t = STATE.tick;

        // Phase 1 → show esperar after a few ticks
        UI.show('btn-esperar', t >= 3);

        // Phase 2
        UI.show('btn-apunte', F.hasTakenNote);
        UI.show('row-apuntes', F.hasTakenNote);
        UI.show('row-mate', F.mateUnlocked);
        UI.show('row-cafe', F.cafeUnlocked);
        UI.show('row-voluntad', F.voluntadUnlocked);

        // Phase 3
        UI.show('btn-invitar', F.hasTakenNote && Math.floor(R.apuntes) >= 10 && !F.hasCompanion);

        // Phase 5+ actions
        const canAsamblea = F.hasGroup && R.presupuesto < 60 && !F.hasCalledAssembly;
        UI.show('btn-asamblea', canAsamblea);

        const canParo = F.hasCalledAssembly && !F.hasCalledStrike;
        UI.show('btn-paro', canParo);

        const canMarcha = F.hasCalledStrike;
        UI.show('btn-marcha', canMarcha);

        // Reaction buttons
        UI.show('btn-conferencia', F.reactionBtnConferencia);
        UI.show('btn-paro-docente', F.reactionBtnParoDocente);

        // Background darkening
        UI.updateBackground(R.presupuesto);

        // Buff indicators
        UI.updateBuffIndicators(R.cafe >= 8, R.mate >= 5);
      },

      maybeFireEvent() {
        // Placeholder for event logic
      },

      resolveGovEvent(choice) {
        // Placeholder for government event resolution
        UI.hideGovEvent();
      }
    };

    // === UI ===
    const UI = {
      logQueue: [],
      logProcessing: false,

      render() {
        const R = STATE.resources;
        document.getElementById('val-apuntes').textContent = Math.floor(R.apuntes);
        document.getElementById('val-mate').textContent = Math.floor(R.mate);
        document.getElementById('val-cafe').textContent = Math.floor(R.cafe);
        document.getElementById('val-voluntad').textContent = Math.floor(R.voluntad);
        document.getElementById('val-presupuesto').textContent = Math.floor(R.presupuesto);
      },

      show(id, condition) {
        const el = document.getElementById(id);
        if (!el) return;
        if (condition) {
          el.style.display = '';
          // Trigger fade-in on next frame if not already visible
          if (!el.classList.contains('visible')) {
            requestAnimationFrame(() => el.classList.add('visible'));
          }
        } else {
          el.style.display = 'none';
          el.classList.remove('visible');
        }
      },

      addLog(text) {
        this.logQueue.push(text);
        if (!this.logProcessing) this._processQueue();
      },

      _processQueue() {
        if (this.logQueue.length === 0) {
          this.logProcessing = false;
          return;
        }
        this.logProcessing = true;
        const text = this.logQueue.shift();
        const line = document.createElement('div');
        line.className = 'log-line';
        line.textContent = text;
        const panel = document.getElementById('log-panel');
        panel.appendChild(line);
        requestAnimationFrame(() => {
          requestAnimationFrame(() => line.classList.add('visible'));
        });
        panel.scrollTop = panel.scrollHeight;
        setTimeout(() => this._processQueue(), 800);
      },

      updateBackground(presupuesto) {
        let bg;
        if (presupuesto >= 70) bg = '#0a0a0a';
        else if (presupuesto >= 40) bg = '#060608';
        else if (presupuesto >= 15) bg = '#080604';
        else bg = '#080402';
        document.body.style.backgroundColor = bg;
      },

      updateBuffIndicators(cafeActive, mateActive) {
        // Café buff indicator on apuntes row
        let cafeInd = document.getElementById('buff-cafe');
        if (cafeActive) {
          if (!cafeInd) {
            cafeInd = document.createElement('span');
            cafeInd.id = 'buff-cafe';
            cafeInd.className = 'buff-indicator';
            cafeInd.title = 'el grupo está despierto: apuntes +20%';
            cafeInd.textContent = '↑';
            document.querySelector('#row-apuntes .resource-value').after(cafeInd);
          }
        } else if (cafeInd) {
          cafeInd.remove();
        }

        // Mate buff indicator on voluntad row
        let mateInd = document.getElementById('buff-mate');
        if (mateActive) {
          if (!mateInd) {
            mateInd = document.createElement('span');
            mateInd.id = 'buff-mate';
            mateInd.className = 'buff-indicator';
            mateInd.title = 'alguien cebó mate: voluntad +15%';
            mateInd.textContent = '↑';
            document.querySelector('#row-voluntad .resource-value').after(mateInd);
          }
        } else if (mateInd) {
          mateInd.remove();
        }
      },

      showGovEvent(eventObj) {
        const section = document.getElementById('gov-section');
        document.getElementById('gov-event-text').textContent = eventObj.text;
        const buttonsDiv = document.getElementById('gov-buttons');
        buttonsDiv.innerHTML = '';

        if (eventObj.choices) {
          eventObj.choices.forEach(choice => {
            const btn = document.createElement('button');
            btn.className = 'gov-btn';
            btn.textContent = choice.label;
            btn.onclick = () => GAME.resolveGovEvent(choice);
            buttonsDiv.appendChild(btn);
          });
        } else {
          // No-choice event — just show "entendido"
          const btn = document.createElement('button');
          btn.className = 'gov-btn';
          btn.textContent = '[entendido]';
          btn.onclick = () => GAME.resolveGovEvent(null);
          buttonsDiv.appendChild(btn);
        }
        section.style.display = 'block';
      },

      hideGovEvent() {
        document.getElementById('gov-section').style.display = 'none';
        document.getElementById('gov-buttons').innerHTML = '';
        document.getElementById('gov-event-text').textContent = '';
      }
    };

    // === INIT ===
    document.addEventListener('DOMContentLoaded', () => {
      // Reset button
      document.getElementById('reset-btn').addEventListener('click', () => {
        document.getElementById('reset-btn').style.display = 'none';
        document.getElementById('reset-confirm').style.display = 'inline';
      });
      document.getElementById('confirm-yes').addEventListener('click', () => {
        resetState();
        location.reload();
      });
      document.getElementById('confirm-no').addEventListener('click', () => {
        document.getElementById('reset-btn').style.display = '';
        document.getElementById('reset-confirm').style.display = 'none';
      });

      GAME.start();
    });
  </script>
</body>
</html>
